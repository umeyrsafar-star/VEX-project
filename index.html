<style>
:root{--bg:#000810;--accent:#00ffcc;--gold:#ffd700;--text:#e0e8f0;--border:#1a2a40;--panel:#0a1628}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;height:100vh;width:100vw;overflow:hidden;touch-action:manipulation}
.central{display:grid;grid-template-rows:auto 1fr auto;height:100vh;max-width:600px;margin:0 auto}
.header{background:linear-gradient(180deg,var(--panel),#000510);padding:12px 14px;border-bottom:1px solid var(--accent);display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:26px;animation:glow 2s infinite}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
.logo-text{font-size:0.9rem;font-weight:bold;color:var(--accent)}
.logo-sub{font-size:0.55rem;color:var(--accent);opacity:0.7;letter-spacing:2px}
.pills{display:flex;gap:6px}
.pill{padding:5px 10px;border-radius:12px;font-size:0.6rem;border:1px solid var(--border);background:rgba(0,255,204,0.05)}
.pill.on{border-color:var(--accent);color:var(--accent)}
.pill.nav{border-color:var(--gold);color:var(--gold)}
.pill.ok{border-color:#00ff88;color:#00ff88}
.main-view{position:relative;background:#000;overflow:hidden;flex:1}
#cam{width:100%;height:100%;object-fit:cover}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
.hud-top{display:flex;justify-content:space-between;padding:10px 12px}
.hud-item{background:rgba(0,0,0,0.85);padding:6px 12px;border-radius:12px;font-size:0.6rem;border:1px solid var(--border);backdrop-filter:blur(10px)}
.hud-item.hl{border-color:var(--accent);color:var(--accent)}
.hud-msg{position:absolute;bottom:20px;left:12px;right:12px;background:rgba(0,0,0,0.9);padding:16px;border-radius:18px;font-size:0.8rem;line-height:1.6;border:1px solid var(--accent);text-align:center;backdrop-filter:blur(10px)}
.hud-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.hud-center .arrow{font-size:5rem;animation:float 2s infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.hud-center .label{font-size:0.85rem;color:var(--accent);margin-top:8px}
.voice-wave{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:none;gap:4px;align-items:flex-end;height:40px}
.voice-wave .bar{width:5px;background:var(--accent);border-radius:3px;animation:wave 0.8s infinite alternate}
.voice-wave .bar:nth-child(1){height:15px;animation-delay:0s}
.voice-wave .bar:nth-child(2){height:25px;animation-delay:0.1s}
.voice-wave .bar:nth-child(3){height:35px;animation-delay:0.2s}
.voice-wave .bar:nth-child(4){height:28px;animation-delay:0.3s}
.voice-wave .bar:nth-child(5){height:18px;animation-delay:0.4s}
@keyframes wave{0%{transform:scaleY(0.5)}100%{transform:scaleY(1)}}
.start-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at center,var(--panel),var(--bg));z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}
.start-overlay.hidden{display:none}
.start-overlay .pulse-ring{width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);animation:pulseRing 2s infinite;display:flex;align-items:center;justify-content:center;margin-bottom:30px}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.2);opacity:1}}
.start-overlay .brain-icon{font-size:60px}
.start-overlay .start-title{color:var(--accent);font-size:1.5rem;font-weight:bold;margin-bottom:8px;text-shadow:0 0 20px var(--accent)}
.start-overlay .start-sub{color:#888;font-size:0.8rem;margin-bottom:40px;text-align:center;padding:0 30px;line-height:1.5}

// ============================================================
// 🔊 FALA
// ============================================================
function speak(texto){
  if(!S.started||!texto||S.speaking) return;
  S.speaking=true;
  document.getElementById('voiceWave').style.display='flex';
  
  if(!('speechSynthesis' in window)){
    S.speaking=false;
    document.getElementById('voiceWave').style.display='none';
    return;
  }
  
  var u=new SpeechSynthesisUtterance(texto);
  u.lang='pt-BR';
  u.rate=0.85;
  u.pitch=1.0;
  u.volume=1.0;
  
  var voices=window.speechSynthesis.getVoices();
  if(voices&&voices.length>0){
    for(var i=0;i<voices.length;i++){
      if(voices[i].lang&&voices[i].lang.indexOf('pt')!==-1){
        u.voice=voices[i];
        break;
      }
    }
  }
  
  u.onstart=function(){document.getElementById('hudStatus').textContent='FALANDO';};
  u.onend=function(){S.speaking=false;document.getElementById('voiceWave').style.display='none';document.getElementById('hudStatus').textContent='ATIVA';};
  u.onerror=function(){S.speaking=false;document.getElementById('voiceWave').style.display='none';document.getElementById('hudStatus').textContent='ATIVA';};
  
  window.speechSynthesis.speak(u);
}

// ============================================================
// 🎤 MICROFONE (com detecao de silencio)
// ============================================================
function toggleVoice(){S.listening?stopListen():startListen();}

function startListen(){
  if(S.listening||S.speaking) return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  
  recog=new SR();
  recog.lang='pt-MZ';
  recog.interimResults=true;
  recog.continuous=false;
  
  recog.onstart=function(){
    S.listening=true;
    document.getElementById('btnVoice').textContent='OUVINDO';
    document.getElementById('btnVoice').classList.add('on');
    document.getElementById('voiceWave').style.display='flex';
    hudMsg('A ouvir... Fale agora');
    document.getElementById('hudStatus').textContent='OUVINDO';
  };
  
  recog.onresult=function(e){
    var t='';
    for(var i=0;i<e.results.length;i++){
      t+=e.results[i][0].transcript;
    }
    
    // Se ja tem resultado final, processar
    if(e.results[e.results.length-1].isFinal){
      t=t.trim();
      if(t){
        stopListen();
        hudMsg('Voce disse: '+t);
        processar(t);
      }
    }
  };
  
  recog.onerror=function(e){
    if(e.error==='no-speech'){
      hudMsg('Nenhuma fala detectada. Tente novamente.');
    }
    stopListen();
  };
  
  recog.onend=function(){
    stopListen();
  };
  
  try{recog.start();}catch(e){stopListen();}
}

function stopListen(){
  S.listening=false;
  if(recog){try{recog.stop();}catch(e){};recog=null;}
  document.getElementById('btnVoice').textContent='COMANDAR';
  document.getElementById('btnVoice').classList.remove('on');
  document.getElementById('voiceWave').style.display='none';
  document.getElementById('hudStatus').textContent='ATIVA';
}

// ============================================================
// 💬 PROCESSAR COMANDO (Base de Conhecimento)
// ============================================================
function processar(texto){
  var q=removerAcentos(texto.toLowerCase());
  console.log('Processar: '+q);
  
  // Procurar na base de conhecimento
  for(var categoria in CONHECIMENTO){
    var dados=CONHECIMENTO[categoria];
    if(dados.palavras){
      for(var i=0;i<dados.palavras.length;i++){
        if(q.indexOf(dados.palavras[i])!==-1){
          var respostas=dados.respostas;
          var r=respostas[Math.floor(Math.random()*respostas.length)];
          responder(r);
          return;
        }
      }
    }
  }
  
  // Verificar destinos para navegacao
  for(var k in DESTINOS){
    var dk=removerAcentos(k);
    if(q.indexOf(dk)!==-1||q.indexOf(removerAcentos(DESTINOS[k].nome.toLowerCase()))!==-1){
      definirDestino(DESTINOS[k]);
      return;
    }
  }
  
  // Resposta padrao
  var padrao=[
    'Desculpe, nao tenho informacao sobre isso. Posso falar sobre a Ilha de Mocambique, Praia do Tofo, Maputo, Lago Niassa, Bazaruto, Pemba, Vilanculos, gastronomia, cultura ou historia de Mocambique. O que prefere?',
    'Nao encontrei informacao sobre esse topico. Que tal perguntar sobre as praias do Sul, as ilhas do Norte, ou a gastronomia mocambicana?',
    'Esse assunto nao esta na minha base de conhecimento. Posso ajuda-lo com informacoes sobre os principais destinos turisticos de Mocambique. O que gostaria de saber?'
  ];
  responder(padrao[Math.floor(Math.random()*padrao.length)]);
}

function responder(msg){
  hudMsg(msg);
  speak(msg);
}

// ============================================================
// 🗺️ NAVEGACAO
// ============================================================
function definirDestino(d){
  S.dest=d;S.arrived=false;
  document.getElementById('valDest').textContent=d.nome.split(' ')[0];
  document.getElementById('pillDest').textContent=d.nome;
  document.getElementById('pillDest').className='pill on';
  document.getElementById('hudCenter').innerHTML='<div class="arrow">'+d.seta+'</div><div class="label">'+d.dir+'</div>';
  var msg=d.nome+', na provincia de '+d.prov+', direcao '+d.dir+'. '+d.desc+'. '+d.dica+'. Diga NAVEGAR para iniciar.';
  hudMsg(msg);
  speak(msg);
}

function iniciarNavegacao(){
  if(!S.dest){speak('Defina um destino primeiro. Diga o nome do local.');return;}
  S.navigating=true;S.arrived=false;S.navStart=Date.now();
  document.getElementById('pillNav').textContent='NAVEGANDO';
  document.getElementById('pillNav').className='pill nav';
  enviarSinal(S.dest.cor,S.dest.dir);
  var msg='Navegando para '+S.dest.nome+'. Siga o robo!';
  hudMsg(msg);speak(msg);
}

function verificarChegada(){
  if(!S.navStart)return;
  document.getElementById('valDist').textContent=Math.floor((Date.now()-S.navStart)/1000)+'s';
  if((Date.now()-S.navStart)>8000)chegou();
}

function chegou(){
  S.navigating=false;S.arrived=true;
  document.getElementById('pillNav').textContent='CHEGOU';
  document.getElementById('pillNav').className='pill ok';
  document.getElementById('hudCenter').innerHTML='<div class="arrow">🎯</div><div class="label">CHEGOU!</div>';
  var msg='Chegamos a '+S.dest.nome+'! Bem-vindo a '+S.dest.prov+'!';
  hudMsg(msg);speak(msg);
}

function pararTudo(){
  S.navigating=false;S.arrived=false;S.dest=null;
  document.getElementById('pillNav').textContent='PARADO';
  document.getElementById('pillNav').className='pill';
  document.getElementById('hudCenter').innerHTML='<div class="arrow">🧠</div><div class="label">Em espera</div>';
  document.getElementById('valDist').textContent='--';document.getElementById('valDest').textContent='--';
  document.getElementById('pillDest').textContent='--';document.getElementById('pillDest').className='pill';
  hudMsg('Central em espera.');speak('Central em espera. Pronta para novo comando.');
}

function enviarSinal(corHex,dir){
  var overlay=document.createElement('div');
  overlay.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;background:'+corHex+';opacity:0.9;z-index:50;box-shadow:0 0 80px '+corHex;
  document.getElementById('mainView').appendChild(overlay);
  try{var AC=window.AudioContext||window.webkitAudioContext;var ctx=new AC();var osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=dir==='NORTE'?600:800;gain.gain.value=0.5;osc.start();setTimeout(function(){osc.stop();ctx.close();overlay.remove();},4000);}catch(e){}
}

function sugerirDestino(){
  var keys=Object.keys(DESTINOS);
  var d=DESTINOS[keys[Math.floor(Math.random()*keys.length)]];
  var msg='Sugiro visitar '+d.nome+', na provincia de '+d.prov+'. '+d.desc+'. '+d.dica;
  hudMsg(msg);speak(msg);
}

function gerarRelatorio(){
  var r='IA: Modo Offline | Cam:'+(S.cam?'Ativa':'Off')+' | Humanos:'+S.humans+' | Objetos:'+S.objects+' | Destino:'+(S.dest?S.dest.nome:'Nenhum');
  hudMsg(r);speak(r);
}

// ============================================================
// 🛠️ UTILITARIOS
// ============================================================
function removerAcentos(s){
  return s.replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e').replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o').replace(/[ùúûü]/g,'u').replace(/[ç]/g,'c');
}

function hudMsg(m){document.getElementById('hudMsg').textContent=m;}

// ============================================================
// 📷 VISAO
// ============================================================
async function initCam(){var v=document.getElementById('cam');if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return false;try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:480}},audio:false});v.srcObject=camStream;await new Promise(function(r){v.onloadedmetadata=function(){v.play().then(r).catch(r);};setTimeout(r,3000);});S.cam=true;return true;}catch(e){return false;}}
async function initAI(){try{model=await cocoSsd.load({base:'lite_mobilenet_v2'});S.model=true;startDetect();return true;}catch(e){return false;}}
function startDetect(){if(detectTimer)clearInterval(detectTimer);detectTimer=setInterval(detect,3000);}
function stopDetect(){if(detectTimer){clearInterval(detectTimer);detectTimer=null;}}
async function detect(){if(!S.model||!S.cam)return;var v=document.getElementById('cam'),c=document.getElementById('canvas'),ctx=c.getContext('2d');if(!v.videoWidth)return;try{var preds=await model.detect(v);c.width=v.videoWidth;c.height=v.videoHeight;ctx.clearRect(0,0,c.width,c.height);var h=0,o=0;for(var i=0;i<preds.length;i++){var p=preds[i],isHuman=p.class==='person';if(isHuman)h++;else o++;ctx.strokeStyle=isHuman?'#00ff88':'#ffaa00';ctx.lineWidth=isHuman?4:2;ctx.strokeRect(p.bbox[0],p.bbox[1],p.bbox[2],p.bbox[3]);ctx.fillStyle=isHuman?'#00ff88':'#ffaa00';ctx.font='bold 13px monospace';ctx.fillText((isHuman?'Humano':'Objeto'),p.bbox[0]+4,p.bbox[1]-6);}S.humans=h;S.objects=o;document.getElementById('valHum').textContent=h;document.getElementById('valObj').textContent=o;document.getElementById('hudObj').textContent=(h+o);if(S.navigating&&!S.arrived)verificarChegada();}catch(e){}}

// ============================================================
// 🚀 ATIVACAO
// ============================================================
document.getElementById('startBtn').addEventListener('click',function(){
  document.getElementById('startOverlay').classList.add('hidden');
  S.started=true;
  document.getElementById('hudCenter').innerHTML='<div class="arrow">🧠</div><div class="label">CENTRAL ATIVA</div>';
  document.getElementById('hudStatus').textContent='ATIVA';
  
  var saudacao='Ola! Sou a Super Central VEX, sua guia turistica de Mocambique. Estou no modo offline, com respostas imediatas. Em que posso ajudar?';
  hudMsg(saudacao);
  setTimeout(function(){speak(saudacao);},500);
  
  initCam().then(function(c){if(c)initAI();});
});

console.log('SUPER CENTRAL VEX - OFFLINE');
window.addEventListener('beforeunload',function(){stopDetect();if(camStream)camStream.getTracks().forEach(function(t){t.stop();});});
</script>
</body>
