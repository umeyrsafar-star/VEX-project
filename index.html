<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Super Central VEX 🇲🇿</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

<style>
:root{--bg:#000810;--accent:#00ffcc;--gold:#ffd700;--text:#e0e8f0;--border:#1a2a40;--panel:#0a1628}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;height:100vh;width:100vw;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.central{display:grid;grid-template-rows:auto 1fr auto;height:100vh;max-width:600px;margin:0 auto}
.header{background:linear-gradient(180deg,var(--panel),#000510);padding:12px 14px;border-bottom:1px solid var(--accent);display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:26px}
.logo-text{font-size:0.9rem;font-weight:bold;color:var(--accent)}
.logo-sub{font-size:0.55rem;color:var(--accent);opacity:0.7;letter-spacing:2px}
.pills{display:flex;gap:6px}
.pill{padding:5px 10px;border-radius:12px;font-size:0.6rem;border:1px solid var(--border);background:rgba(0,255,204,0.05)}
.pill.on{border-color:var(--accent);color:var(--accent)}
.pill.nav{border-color:var(--gold);color:var(--gold)}
.pill.ok{border-color:#00ff88;color:#00ff88}
.main-view{position:relative;background:#000;overflow:hidden;flex:1}
#cam{width:100%;height:100%;object-fit:cover}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
.hud-top{display:flex;justify-content:space-between;padding:10px 12px}
.hud-item{background:rgba(0,0,0,0.85);padding:6px 12px;border-radius:12px;font-size:0.6rem;border:1px solid var(--border)}
.hud-item.hl{border-color:var(--accent);color:var(--accent)}
.hud-msg{position:absolute;bottom:20px;left:12px;right:12px;background:rgba(0,0,0,0.9);padding:16px;border-radius:18px;font-size:0.8rem;line-height:1.6;border:1px solid var(--accent);text-align:center}
.hud-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.hud-center .arrow{font-size:5rem}
.hud-center .label{font-size:0.85rem;color:var(--accent);margin-top:8px}
.voice-wave{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:none;gap:4px;align-items:flex-end;height:40px}
.voice-wave .bar{width:5px;background:var(--accent);border-radius:3px;animation:wave 0.8s infinite alternate}
.voice-wave .bar:nth-child(1){height:15px;animation-delay:0s}
.voice-wave .bar:nth-child(2){height:25px;animation-delay:0.1s}
.voice-wave .bar:nth-child(3){height:35px;animation-delay:0.2s}
.voice-wave .bar:nth-child(4){height:28px;animation-delay:0.3s}
.voice-wave .bar:nth-child(5){height:18px;animation-delay:0.4s}
@keyframes wave{0%{transform:scaleY(0.5)}100%{transform:scaleY(1)}}
.start-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at center,var(--panel),var(--bg));z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all}
.start-overlay.hidden{display:none}
.start-overlay .pulse-ring{width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);animation:pulseRing 2s infinite;display:flex;align-items:center;justify-content:center;margin-bottom:30px}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.2);opacity:1}}
.start-overlay .brain-icon{font-size:60px}
.start-overlay .start-title{color:var(--accent);font-size:1.5rem;font-weight:bold;margin-bottom:8px}
.start-overlay .start-sub{color:#888;font-size:0.8rem;margin-bottom:40px;text-align:center;padding:0 30px;line-height:1.5}
.start-overlay .start-btn{background:var(--accent);color:#000;border:none;padding:20px 60px;border-radius:35px;font-size:1.2rem;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 0 40px rgba(0,255,204,0.5)}
.panel{background:var(--panel);padding:10px 12px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--accent)}
.intel-row{display:flex;gap:6px}
.intel-box{flex:1;background:rgba(0,0,0,0.5);padding:8px;border-radius:8px;font-size:0.6rem;border:1px solid var(--border);text-align:center}
.intel-box .val{color:var(--accent);font-size:1rem;font-weight:bold}
.intel-box .lbl{color:#556;font-size:0.55rem;margin-top:2px}
.btn-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:5px}
.btn-row.nav-row{grid-template-columns:1fr 1fr}
button{padding:14px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(0,255,204,0.03);color:var(--text);font-size:0.75rem;cursor:pointer;font-family:inherit}
button:active{transform:scale(0.95)}
button.go{background:linear-gradient(135deg,var(--accent),#00b894);border-color:var(--accent);color:#000;font-weight:bold;font-size:0.85rem}
button.go.on{background:linear-gradient(135deg,#ff3366,#ff6b6b);border-color:#ff3366;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,51,102,0.5)}50%{box-shadow:0 0 0 25px rgba(255,51,102,0)}}
button.nav{background:rgba(255,215,0,0.1);border-color:var(--gold);color:var(--gold)}
button.stop{background:rgba(255,107,107,0.1);border-color:#ff6b6b;color:#ff6b6b}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);padding:10px 20px;border-radius:25px;z-index:999;font-size:0.7rem;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="central">
  
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🧠</span>
      <div>
        <div class="logo-text">SUPER CENTRAL VEX</div>
        <div class="logo-sub">INTELIGÊNCIA AVANÇADA</div>
      </div>
    </div>
    <div class="pills">
      <span class="pill on" id="pillIA">🤖 IA</span>
      <span class="pill" id="pillNav">🧭 PRONTO</span>
      <span class="pill" id="pillDest">📍 --</span>
    </div>
  </div>

  <div class="main-view" id="mainView">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="start-overlay" id="startOverlay">
      <div class="pulse-ring"><div class="brain-icon">🧠</div></div>
      <div class="start-title">SUPER CENTRAL VEX</div>
      <div class="start-sub">Guia Turístico de Moçambique 🇲🇿</div>
      <button class="start-btn" id="startBtn">🚀 ATIVAR CENTRAL</button>
    </div>
    
    <div class="voice-wave" id="voiceWave">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    
    <div class="hud">
      <div class="hud-top">
        <span class="hud-item hl" id="hudStatus">🧠 INICIANDO</span>
        <span class="hud-item" id="hudGPS">📍 Moçambique</span>
        <span class="hud-item" id="hudObj">👁 0</span>
      </div>
      <div class="hud-center" id="hudCenter">
        <div class="arrow">🧠</div>
        <div class="label">Toque em ATIVAR CENTRAL</div>
      </div>
      <div class="hud-msg" id="hudMsg">🧠 Super Central VEX</div>
    </div>
  </div>

  <div class="panel">
    <div class="intel-row">
      <div class="intel-box"><div class="val" id="valHum">0</div><div class="lbl">👤 Humanos</div></div>
      <div class="intel-box"><div class="val" id="valObj">0</div><div class="lbl">📦 Objetos</div></div>
      <div class="intel-box"><div class="val" id="valDist">--</div><div class="lbl">📏 Dist</div></div>
      <div class="intel-box"><div class="val" id="valDest">--</div><div class="lbl">🎯 Destino</div></div>
    </div>
    <div class="btn-row">
      <button class="go" onclick="toggleVoice()">🎤 COMANDAR</button>
      <button onclick="sugerirDestino()">💡</button>
      <button onclick="gerarRelatorio()">📊</button>
    </div>
    <div class="btn-row nav-row">
      <button class="nav" onclick="iniciarNavegacao()">🧭 NAVEGAR</button>
      <button class="stop" onclick="pararTudo()">⏹ PARAR</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// SUPER CENTRAL VEX - VERSÃO FINAL
// TTS FALLBACK UNIVERSAL
// ============================================================

const API_KEY = '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';

const DESTINOS = {
  'ilha de mocambique':{nome:'Ilha de Moçambique',prov:'Nampula',dir:'NORTE',cor:'#FF0000',seta:'⬆️',desc:'Património UNESCO.',dica:'Palácio de São Paulo.'},
  'praia do tofo':{nome:'Praia do Tofo',prov:'Inhambane',dir:'SUL',cor:'#0000FF',seta:'⬇️',desc:'Mergulho com tubarões-baleia.',dica:'Outubro a março.'},
  'maputo':{nome:'Maputo',prov:'Maputo',dir:'SUL',cor:'#0000FF',seta:'⬇️',desc:'Capital vibrante.',dica:'FEIMA e Mercado Central.'},
  'lago niassa':{nome:'Lago Niassa',prov:'Niassa',dir:'CENTRO',cor:'#00FF00',seta:'➡️',desc:'3º maior lago de África.',dica:'Ilhas Likoma.'}
};

const SAUDACOES = ['Olá! Sou a Super Central VEX. Em que posso ajudar?','Bem-vindo! Para onde deseja viajar hoje?'];

const S = {cam:false,model:false,listening:false,dest:null,navigating:false,arrived:false,humans:0,objects:0,navStart:0,started:false,speaking:false};

let model=null,camStream=null,recog=null,detectTimer=null;

// ============================================================
// 🔊 FALA - FALLBACK UNIVERSAL
// ============================================================
function speak(texto){
  if(!S.started||!texto||S.speaking) return;
  if(!('speechSynthesis' in window)){hudMsg('❌ Voz não suportada');return;}
  
  S.speaking=true;
  document.getElementById('voiceWave').style.display='flex';
  
  const u=new SpeechSynthesisUtterance(texto);
  u.lang='pt-BR';
  u.rate=0.9;
  u.pitch=1.0;
  u.volume=1.0;
  
  // Tentar usar qualquer voz disponível
  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0){
    const pt=voices.find(v=>v.lang.startsWith('pt'))||voices[0];
    u.voice=pt;
  }
  
  u.onstart=()=>console.log('🔊 FALANDO');
  u.onend=()=>{S.speaking=false;document.getElementById('voiceWave').style.display='none';};
  u.onerror=(e)=>{S.speaking=false;document.getElementById('voiceWave').style.display='none';console.error(e);};
  
  window.speechSynthesis.cancel();
  setTimeout(()=>window.speechSynthesis.speak(u),100);
}

// ============================================================
// 🎤 MICROFONE
// ============================================================
function toggleVoice(){S.listening?stopListen():startListen();}

function startListen(){
  if(S.listening||S.speaking) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recog=new SR();recog.lang='pt-MZ';
  recog.onstart=()=>{S.listening=true;document.getElementById('voiceWave').style.display='flex';hudMsg('🎤 A ouvir...');};
  recog.onresult=(e)=>{const t=e.results[0][0].transcript.trim();if(t){stopListen();hudMsg('🗣 '+t);processar(t);}};
  recog.onerror=()=>stopListen();
  recog.onend=()=>stopListen();
  try{recog.start();}catch(e){}
}

function stopListen(){S.listening=false;if(recog)try{recog.stop()}catch(e){};document.getElementById('voiceWave').style.display='none';}

// ============================================================
// 💬 PROCESSAR
// ============================================================
function processar(cmd){
  const q=cmd.toLowerCase();
  if(/ol[áa]|oi|hey/.test(q)){responder(SAUDACOES[Math.floor(Math.random()*SAUDACOES.length)]);return;}
  if(/parar/.test(q)){pararTudo();return;}
  if(/navegar/.test(q)){iniciarNavegacao();return;}
  if(/suger|recomend/.test(q)){sugerirDestino();return;}
  for(const[k,v]of Object.entries(DESTINOS)){if(q.includes(k)||q.includes(v.nome.toLowerCase())){definirDestino(v);return;}}
  consultarIA(cmd);
}

// ============================================================
// 🤖 IA
// ============================================================
function consultarIA(p){
  const xhr=new XMLHttpRequest();
  xhr.open('POST','https://api.groq.com/openai/v1/chat/completions',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+API_KEY);
  xhr.timeout=15000;
  xhr.onload=()=>{if(xhr.status===200){try{const d=JSON.parse(xhr.responseText);if(d.choices&&d.choices[0])responder(d.choices[0].message.content);}catch(e){}}};
  xhr.onerror=()=>responder('📡 Sem conexão.');
  xhr.send(JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:'Guia de Moçambique. 2 frases em Português.'},{role:'user',content:p}],max_tokens:200}));
}

function responder(msg){hudMsg('🤖 '+msg);speak(msg);}

// ============================================================
// 🗺️ NAVEGAÇÃO
// ============================================================
function definirDestino(d){
  S.dest=d;S.arrived=false;
  document.getElementById('valDest').textContent=d.nome.split(' ')[0];
  document.getElementById('pillDest').textContent='📍 '+d.nome;
  document.getElementById('pillDest').className='pill on';
  document.getElementById('hudCenter').innerHTML='<div class="arrow">'+d.seta+'</div><div class="label">'+d.dir+'</div>';
  hudMsg('🎯 '+d.nome+' ('+d.dir+')');speak(d.nome+'. '+d.desc);
}

function iniciarNavegacao(){
  if(!S.dest){speak('Defina um destino.');return;}
  S.navigating=true;S.arrived=false;S.navStart=Date.now();
  document.getElementById('pillNav').textContent='🧭 NAVEGANDO';
  document.getElementById('pillNav').className='pill nav';
  enviarSinal(S.dest.cor,S.dest.dir);
  hudMsg('🧭 Navegando para '+S.dest.nome);speak('Navegando para '+S.dest.nome+'. Siga o robô!');
}

function verificarChegada(){
  if(!S.navStart) return;
  document.getElementById('valDist').textContent=Math.floor((Date.now()-S.navStart)/1000)+'s';
  if((Date.now()-S.navStart)>8000) chegou();
}

function chegou(){
  S.navigating=false;S.arrived=true;
  document.getElementById('pillNav').textContent='✅ CHEGOU';
  document.getElementById('pillNav').className='pill ok';
  document.getElementById('hudCenter').innerHTML='<div class="arrow">🎯</div><div class="label">CHEGOU!</div>';
  hudMsg('✅ Chegámos!');speak('Chegámos ao destino! Bem-vindo!');
}

function pararTudo(){
  S.navigating=false;S.arrived=false;S.dest=null;
  document.getElementById('pillNav').textContent='⏹ PARADO';
  document.getElementById('pillNav').className='pill';
  document.getElementById('hudCenter').innerHTML='<div class="arrow">🧠</div><div class="label">Em espera</div>';
  document.getElementById('valDist').textContent='--';document.getElementById('valDest').textContent='--';
  document.getElementById('pillDest').textContent='📍 --';document.getElementById('pillDest').className='pill';
  hudMsg('⏹ Parado.');speak('Central em espera.');
}

// ============================================================
// 📡 SINAL
// ============================================================
function enviarSinal(corHex,dir){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;background:'+corHex+';opacity:0.9;z-index:50;box-shadow:0 0 80px '+corHex;
  document.getElementById('mainView').appendChild(overlay);
  setTimeout(()=>overlay.remove(),4000);
  toast('📡 Sinal '+dir);
}

// ============================================================
// 💡 SUGESTÕES
// ============================================================
function sugerirDestino(){
  const d=Object.values(DESTINOS)[Math.floor(Math.random()*Object.values(DESTINOS).length)];
  hudMsg('💡 '+d.nome);speak('Sugiro '+d.nome+'. '+d.desc);
}

function gerarRelatorio(){
  const r='📊 IA:'+(S.model?'✅':'❌')+' Câmara:'+(S.cam?'✅':'❌')+' Humanos:'+S.humans+' Objetos:'+S.objects;
  hudMsg(r);speak(r);
}

// ============================================================
// 📷 VISÃO
// ============================================================
async function initCam(){
  const v=document.getElementById('cam');
  if(!navigator.mediaDevices?.getUserMedia) return false;
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:480}},audio:false});
    v.srcObject=camStream;
    await new Promise(r=>{v.onloadedmetadata=()=>v.play().then(r).catch(r);setTimeout(r,3000);});
    S.cam=true;return true;
  }catch(e){return false;}
}

async function initAI(){
  try{model=await cocoSsd.load({base:'lite_mobilenet_v2'});S.model=true;startDetect();return true;}catch(e){return false;}
}

function startDetect(){if(detectTimer)clearInterval(detectTimer);detectTimer=setInterval(detect,3000);}
function stopDetect(){if(detectTimer){clearInterval(detectTimer);detectTimer=null;}}

async function detect(){
  if(!S.model||!S.cam) return;
  const v=document.getElementById('cam'),c=document.getElementById('canvas'),ctx=c.getContext('2d');
  if(!v.videoWidth) return;
  try{
    const preds=await model.detect(v);
    c.width=v.videoWidth;c.height=v.videoHeight;ctx.clearRect(0,0,c.width,c.height);
    let h=0,o=0;
    preds.forEach(p=>{
      const isHuman=p.class==='person';if(isHuman)h++;else o++;
      ctx.strokeStyle=isHuman?'#00ff88':'#ffaa00';ctx.lineWidth=isHuman?4:2;
      ctx.strokeRect(p.bbox[0],p.bbox[1],p.bbox[2],p.bbox[3]);
      ctx.fillStyle=isHuman?'#00ff88':'#ffaa00';ctx.font='bold 13px monospace';
      ctx.fillText((isHuman?'👤':'📦')+' '+p.class,p.bbox[0]+4,p.bbox[1]-6);
    });
    S.humans=h;S.objects=o;
    document.getElementById('valHum').textContent=h;
    document.getElementById('valObj').textContent=o;
    document.getElementById('hudObj').textContent='👁 '+(h+o);
    if(S.navigating&&!S.arrived) verificarChegada();
  }catch(e){}
}

// ============================================================
// 🚀 ATIVAÇÃO
// ============================================================
document.getElementById('startBtn').addEventListener('click',function(){
  console.log('🚀 ATIVANDO...');
  document.getElementById('startOverlay').classList.add('hidden');
  S.started=true;
  document.getElementById('hudCenter').innerHTML='<div class="arrow">🧠</div><div class="label">CENTRAL ATIVA</div>';
  document.getElementById('hudStatus').textContent='🧠 ATIVA';
  
  // Forçar carregamento de vozes
  if('speechSynthesis' in window){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.getVoices();
    };
  }
  
  const s=SAUDACOES[Math.floor(Math.random()*SAUDACOES.length)];
  hudMsg('🤖 '+s);
  
  // Pequeno delay para vozes carregarem
  setTimeout(()=>speak(s),500);
  
  initCam().then(c=>{if(c) initAI();});
  toast('✅ Ativada!');
});

function hudMsg(m){document.getElementById('hudMsg').textContent=m;console.log(m);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

console.log('🧠 CENTRAL VEX - FALLBACK UNIVERSAL');
window.addEventListener('beforeunload',()=>{
  stopDetect();
  if(camStream) camStream.getTracks().forEach(t=>t.stop());
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
});
</script>
</body>
</html>
