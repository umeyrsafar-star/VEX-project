<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Super Central VEX - Premium</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

:root{
  --bg:#080d1a;--panel:#0d1425;--accent:#00e5ff;--accent2:#7c4dff;
  --gold:#ffd740;--danger:#ff5252;--text:#e0e8f0;--border:#1e2d45;
  --glass:rgba(13,20,37,0.85);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  height:100vh;width:100vw;overflow:hidden;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.central{display:grid;grid-template-rows:auto 1fr auto;height:100vh;max-width:600px;margin:0 auto}

/* HEADER */
.header{
  background:var(--glass);padding:10px 14px;
  border-bottom:1px solid var(--accent);
  display:flex;justify-content:space-between;align-items:center;
  backdrop-filter:blur(20px);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px}
.logo-text{font-size:0.85rem;font-weight:700;color:var(--accent);letter-spacing:1px}
.logo-sub{font-size:0.55rem;color:var(--accent);opacity:0.6;letter-spacing:2px}
.pills{display:flex;gap:5px}
.pill{
  padding:4px 8px;border-radius:10px;font-size:0.55rem;
  border:1px solid var(--border);background:rgba(0,229,255,0.05);
  font-weight:600;letter-spacing:0.5px;
}
.pill.on{border-color:var(--accent);color:var(--accent)}
.pill.nav{border-color:var(--gold);color:var(--gold)}
.pill.ok{border-color:#00e676;color:#00e676}

/* MAIN VIEW */
.main-view{position:relative;background:#000;overflow:hidden;flex:1}
#cam{width:100%;height:100%;object-fit:cover}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* SCAN LINE */
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scanAnim 3s infinite;z-index:5;pointer-events:none;opacity:0.4;
}
@keyframes scanAnim{0%{top:0}100%{top:100%}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* HUD */
.hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
.hud-top{display:flex;justify-content:space-between;padding:8px 10px}
.hud-item{
  background:rgba(0,0,0,0.8);padding:5px 10px;
  border-radius:10px;font-size:0.55rem;border:1px solid var(--border);
  backdrop-filter:blur(10px);font-weight:500;
}
.hud-item.hl{border-color:var(--accent);color:var(--accent)}

/* TICKER */
.ticker{
  position:absolute;top:50px;left:10px;right:10px;
  background:rgba(0,0,0,0.7);padding:6px 10px;
  border-radius:8px;font-size:0.55rem;color:var(--accent);
  border:1px solid var(--border);display:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* CENTER */
.hud-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.hud-center .arrow{font-size:4rem;animation:float 2s infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.hud-center .label{font-size:0.75rem;color:var(--accent);margin-top:5px;font-weight:600}

/* MESSAGE */
.hud-msg{
  position:absolute;bottom:16px;left:10px;right:10px;
  background:var(--glass);padding:14px;
  border-radius:14px;font-size:0.7rem;line-height:1.5;
  border:1px solid var(--accent);text-align:center;
  backdrop-filter:blur(20px);font-weight:400;
}

/* VOICE WAVE */
.voice-wave{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:none;gap:3px;align-items:flex-end;height:30px}
.voice-wave .bar{width:4px;background:var(--accent);border-radius:2px;animation:wave 0.7s infinite alternate}
.voice-wave .bar:nth-child(1){height:10px}
.voice-wave .bar:nth-child(2){height:18px;animation-delay:0.1s}
.voice-wave .bar:nth-child(3){height:26px;animation-delay:0.2s}
.voice-wave .bar:nth-child(4){height:20px;animation-delay:0.3s}
.voice-wave .bar:nth-child(5){height:14px;animation-delay:0.4s}
@keyframes wave{0%{transform:scaleY(0.4)}100%{transform:scaleY(1)}}

/* START OVERLAY */
.start-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(circle at center,var(--panel),var(--bg));
  z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.start-overlay.hidden{display:none}
.orb-container{position:relative;width:120px;height:120px;margin-bottom:25px}
.orb-ring{
  position:absolute;top:50%;left:50%;border-radius:50%;
  border:2px solid var(--accent);opacity:0.3;
  animation:orbSpin 3s infinite linear;
}
.orb-ring:nth-child(1){width:120px;height:120px;margin:-60px 0 0 -60px;animation-duration:3s}
.orb-ring:nth-child(2){width:100px;height:100px;margin:-50px 0 0 -50px;animation-duration:4s;animation-direction:reverse}
.orb-ring:nth-child(3){width:80px;height:80px;margin:-40px 0 0 -40px;animation-duration:5s}
@keyframes orbSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.orb-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50px}
.start-title{color:var(--accent);font-size:1.4rem;font-weight:700;margin-bottom:6px;letter-spacing:1px}
.start-sub{color:#888;font-size:0.7rem;margin-bottom:30px;text-align:center;padding:0 25px;line-height:1.5}
.start-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;padding:18px 50px;border-radius:30px;
  font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 0 30px rgba(0,229,255,0.3);transition:all 0.3s;
  letter-spacing:0.5px;
}
.start-btn:active{transform:scale(0.92)}

/* CHAT PANEL */
.chat-panel{
  position:absolute;top:10px;bottom:10px;right:10px;width:180px;
  background:var(--glass);border-radius:12px;border:1px solid var(--border);
  padding:8px;overflow-y:auto;z-index:20;display:none;
  backdrop-filter:blur(20px);font-size:0.55rem;
}
.chat-panel .chat-msg{margin-bottom:6px;padding:5px 8px;border-radius:8px;line-height:1.4}
.chat-panel .chat-user{background:rgba(0,229,255,0.1);color:var(--accent)}
.chat-panel .chat-ai{background:rgba(124,77,255,0.1);color:var(--accent2)}

/* DESTINOS LIST */
.destinos-panel{
  position:absolute;top:10px;bottom:10px;left:10px;width:150px;
  background:var(--glass);border-radius:12px;border:1px solid var(--border);
  padding:8px;overflow-y:auto;z-index:20;display:none;
  backdrop-filter:blur(20px);font-size:0.5rem;
}
.destino-card{
  background:rgba(255,255,255,0.03);padding:6px 8px;margin-bottom:4px;
  border-radius:8px;cursor:pointer;border:1px solid transparent;
  transition:all 0.2s;
}
.destino-card:hover{border-color:var(--accent)}
.destino-card .dc-nome{color:var(--accent);font-weight:600}
.destino-card .dc-dir{color:var(--gold);font-size:0.45rem}

/* PANEL */
.panel{background:var(--glass);padding:10px 12px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--accent);backdrop-filter:blur(20px)}
.intel-row{display:flex;gap:5px}
.intel-box{flex:1;background:rgba(0,0,0,0.4);padding:7px;border-radius:8px;font-size:0.55rem;border:1px solid var(--border);text-align:center}
.intel-box .val{color:var(--accent);font-size:0.85rem;font-weight:700}
.intel-box .lbl{color:#556;font-size:0.5rem;margin-top:1px}
.text-input-row{display:flex;gap:4px}
.text-input-row input{flex:1;padding:10px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.7rem;font-family:inherit;outline:none}
.text-input-row input:focus{border-color:var(--accent)}
.text-input-row button{padding:10px 14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.7rem}
.btn-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px}
button{
  padding:12px 6px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,0.03);color:var(--text);
  font-size:0.65rem;cursor:pointer;font-family:inherit;
  font-weight:500;transition:all 0.2s;letter-spacing:0.3px;
}
button:active{transform:scale(0.95)}
button.accent{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
button.accent.on{background:var(--danger);border-color:var(--danger);animation:pulse 1s infinite}
button.purple{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}
button.gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}
button.red{background:var(--danger);border-color:var(--danger);color:#fff;font-weight:600}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,82,82,0.5)}50%{box-shadow:0 0 0 15px rgba(255,82,82,0)}}

.toast{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:var(--glass);border:1px solid var(--accent);
  padding:8px 16px;border-radius:20px;z-index:999;
  font-size:0.65rem;opacity:0;transition:opacity 0.3s;pointer-events:none;
  backdrop-filter:blur(20px);font-weight:500;
}
.toast.show{opacity:1}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
</style>
</head>

</div>

function consultarGroq(pergunta) {
    hudMsg('<i class="fas fa-spinner fa-pulse"></i> 🤔 Pensando...');
    document.getElementById('hudStatus').innerHTML = '<i class="fas fa-brain"></i> PENSANDO';
    
    var q = pergunta.toLowerCase().trim();
    var resposta = encontrarResposta(q);
    
    setTimeout(function() {
        responder(resposta);
    }, 500);
}

function encontrarResposta(pergunta) {
    // 1. Verificar palavras-chave específicas
    for (var key in CONHECIMENTO) {
        var item = CONHECIMENTO[key];
        for (var i = 0; i < item.keywords.length; i++) {
            if (pergunta.indexOf(item.keywords[i]) !== -1) {
                return item.resposta;
            }
        }
    }
    
    // 2. Perguntas sobre melhor época
    if (pergunta.indexOf('melhor época') !== -1 || pergunta.indexOf('quando ir') !== -1) {
        return '📅 A melhor época para visitar Moçambique é entre maio e novembro, estação seca. Temperaturas amenas e menos chuvas. Para praias, outubro a março é ótimo!';
    }
    
    // 3. Perguntas sobre segurança
    if (pergunta.indexOf('segurança') !== -1 || pergunta.indexOf('perigoso') !== -1) {
        return '🔒 Moçambique é acolhedor, mas recomenda-se precaução: evite andar sozinho à noite em áreas desconhecidas e siga recomendações locais. Zonas turísticas são seguras.';
    }
    
    // 4. Perguntas sobre ajuda
    if (pergunta.indexOf('ajuda') !== -1 || pergunta.indexOf('o que podes fazer') !== -1 || pergunta.indexOf('como funciona') !== -1) {
        return mostrarAjudaTexto();
    }
    
    // 5. Resposta padrão
    return '🤔 Não tenho certeza sobre essa pergunta. Posso ajudar com informações sobre destinos em Moçambique, história, cultura e praias. Para navegar com o robô, diga "Ir para Museu da Mueda", "Ir para Monumento" ou "Ir para Fortaleza". O que gostaria de saber?';
}

// ============================================================
// 💬 PROCESSAR COMANDO (VERSÃO DEFINITIVA)
// ============================================================
function processar(cmd) {
    var q = cmd.toLowerCase().trim();
    
    // --- 1. Comandos de controlo ---
    if (/\b(parar|stop|cancelar)\b/.test(q)) { pararTudo(); return; }
    if (/status|relatório|relatorio/.test(q)) { gerarRelatorio(); return; }
    if (/sugerir|recomendar|dicas|sugestão|sugestao/.test(q)) { sugerirDestino(); return; }
    
    if (/ajuda|help|o que podes fazer|o que você faz|como funciona/.test(q)) { 
        var ajuda = mostrarAjudaTexto();
        addToChat('ai', ajuda);
        hudMsg('<i class="fas fa-life-ring"></i> ' + ajuda);
        speak(ajuda);
        return;
    }
    
    // --- 2. "Navegar" sozinho (usa último destino) ---
    if (/^(navegar|iniciar|começar|comecar|vai|vamos|vá|vão)\.?\!?$/.test(q)) {
        if (S.ultimoDestino) {
            executarNavegacao(S.ultimoDestino);
        } else {
            var msg = '⚠️ Defina um destino primeiro. Exemplo: "Ir para o Museu da Mueda"';
            addToChat('ai', msg);
            hudMsg(msg);
            speak(msg);
        }
        return;
    }
    
    // ==========================================================
    // 🔥 REGRA DE OURO: SÓ NAVEGA SE A FRASE COMEÇAR COM COMANDO
    // ==========================================================
    var padroesNavegacao = [
        /^(ir|vai|vamos|vá|va|vão) (para|ao|à|a|no|na|pro|pra) /,
        /^(navegar|navegue|navegando) /,
        /^(leva|leve|me leva|me leve) (para|ao|à|a|no|na|pro|pra) /,
        /^(quero ir|quero ir para|quero ir ao|quero ir à) /,
        /^(siga|siga para|segue|segue para|dirija|dirija para|conduza|conduza para) /
    ];
    
    var comandoNavegacao = false;
    for (var i = 0; i < padroesNavegacao.length; i++) {
        if (padroesNavegacao[i].test(q)) {
            comandoNavegacao = true;
            break;
        }
    }
    
    // --- 3. COMANDO EXPLÍCITO DE NAVEGAÇÃO (MOSTRA COR E NAVEGA) ---
    if (comandoNavegacao) {
        // Extrai o destino do comando
        var destinoNome = null;
        for (var nome in MAPA_CORES) {
            if (q.indexOf(nome.toLowerCase()) !== -1) { destinoNome = nome; break; }
        }
        if (!destinoNome) {
            for (var j = 0; j < DESTINOS.length; j++) {
                if (q.indexOf(DESTINOS[j].nome.toLowerCase()) !== -1) { destinoNome = DESTINOS[j].nome; break; }
            }
        }
        
        if (destinoNome) {
            S.ultimoDestino = destinoNome;
            executarNavegacao(destinoNome);
        } else {
            var msg = '❓ Para onde deseja navegar? Diga "Ir para Museu da Mueda", "Ir para Monumento" ou "Ir para Fortaleza".';
            addToChat('ai', msg);
            hudMsg(msg);
            speak(msg);
        }
        return;
    }
    
    // ==========================================================
    // 4. PERGUNTAS INFORMATIVAS (NUNCA MOSTRAM COR OU NAVEGAM!)
    // ==========================================================
    
    // Verificar se é pergunta sobre destino da mini cidade
    for (var nomeDestino in MAPA_CORES) {
        if (q.indexOf(nomeDestino.toLowerCase()) !== -1) {
            var destino = encontrarDestino(nomeDestino);
            var corInfo = MAPA_CORES[nomeDestino];
            if (destino && corInfo) {
                // 🔥 MOSTRA APENAS A RESPOSTA, SEM COR, SEM NAVEGAÇÃO!
                var msg = '📌 ' + destino.emoji + ' ' + destino.nome + ': ' + destino.desc + ' ' + destino.dica + 
                          '. Para navegar, diga "Ir para ' + destino.nome + '".';
                addToChat('ai', msg);
                hudMsg('<i class="fas fa-info-circle"></i> ' + msg);
                speak(msg);
                return;
            }
        }
    }
    
    // Verificar perguntas sobre outros destinos
    for (var k = 0; k < DESTINOS.length; k++) {
        if (q.indexOf(DESTINOS[k].nome.toLowerCase()) !== -1) {
            var destino = DESTINOS[k];
            var msg = '📌 ' + destino.emoji + ' ' + destino.nome + ': ' + destino.desc + ' ' + destino.dica + 
                      '. Para navegar, diga "Ir para ' + destino.nome + '".';
            addToChat('ai', msg);
            hudMsg('<i class="fas fa-info-circle"></i> ' + msg);
            speak(msg);
            return;
        }
    }
    
    // --- 5. Tudo o resto → IA offline ---
    consultarGroq(cmd);
}

// ============================================================
// 🧭 EXECUTAR NAVEGAÇÃO
// ============================================================
function executarNavegacao(destinoNome) {
    var destino = encontrarDestino(destinoNome);
    if (!destino) {
        var msg = '❌ Não encontrei o destino "' + destinoNome + '".';
        addToChat('ai', msg);
        hudMsg(msg);
        speak(msg);
        return;
    }
    
    var corInfo = MAPA_CORES[destino.nome];
    if (corInfo) {
        definirDestino(destino, false);
        mostrarSinalCor(corInfo.cor, corInfo.nome, corInfo.dir, corInfo.emoji, destino.nome);
        iniciarNavegacao();
    } else {
        definirDestino(destino, false);
        enviarSinalNormal(destino.cor, destino.dir, destino.emoji, destino.nome);
        iniciarNavegacao();
    }
}

function encontrarDestino(nome) {
    var nomeLower = nome.toLowerCase();
    for (var i = 0; i < DESTINOS.length; i++) {
        if (DESTINOS[i].nome.toLowerCase().indexOf(nomeLower) !== -1) return DESTINOS[i];
    }
    return null;
}

// ============================================================
function definirDestino(d, falar) {
    if (falar === undefined) falar = true;
    S.dest = d;
    S.arrived = false;
    document.getElementById('valDest').textContent = d.nome.split(' ')[0];
    document.getElementById('pillDest').textContent = d.nome;
    document.getElementById('pillDest').className = 'pill on';
    
    var msg = d.emoji + ' ' + d.nome + ', ' + d.prov + ', ' + d.dir + '. ' + d.desc + '. ' + d.dica;
    hudMsg('<i class="fas fa-map-pin"></i> ' + msg);
    
    if (falar) {
        addToChat('ai', msg);
        speak(msg + '. Diga NAVEGAR.');
    }
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            var dist = calcularDistancia(pos.coords.latitude, pos.coords.longitude, d.lat, d.lon);
            document.getElementById('valDist').textContent = dist + 'km';
        });
    }
}

// ============================================================
// 🎨 MOSTRAR SINAL DE COR (SÓ COM COMANDOS EXPLÍCITOS)
// ============================================================
function mostrarSinalCor(corHex, nomeCor, direcao, emoji, destinoNome) {
    if (S.timeoutSinal) { clearTimeout(S.timeoutSinal); S.timeoutSinal = null; }
    
    var overlay = document.getElementById('colorOverlay');
    var circle = document.getElementById('colorCircle');
    var label = document.getElementById('colorLabel');
    var dir = document.getElementById('colorDir');
    var emojiEl = document.getElementById('colorEmoji');
    
    circle.style.color = corHex;
    circle.style.background = corHex + '33';
    circle.style.border = '4px solid ' + corHex;
    circle.style.boxShadow = '0 0 80px ' + corHex + ', inset 0 0 60px ' + corHex + '44';
    
    emojiEl.textContent = emoji || '🔴';
    label.textContent = nomeCor + ' - ' + destinoNome;
    dir.textContent = 'Direção: ' + direcao + ' ' + (direcao === 'NORTE' ? '⬆️' : direcao === 'SUL' ? '⬇️' : '➡️');
    
    overlay.style.display = 'flex';
    overlay.style.animation = 'none';
    overlay.offsetHeight;
    overlay.style.animation = 'fadeIn 0.5s ease';
    
    S.sinalAtivo = true;
    
    try {
        var AC = window.AudioContext || window.webkitAudioContext;
        var ctx = new AC();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        if (direcao === 'NORTE') osc.frequency.value = 600;
        else if (direcao === 'SUL') osc.frequency.value = 800;
        else osc.frequency.value = 1000;
        gain.gain.value = 0.4;
        osc.start();
        setTimeout(function() { osc.stop(); ctx.close(); }, 1500);
    } catch(e) {}
    
    S.timeoutSinal = setTimeout(function() {
        overlay.style.display = 'none';
        S.sinalAtivo = false;
        S.timeoutSinal = null;
    }, 5000);
    
    document.getElementById('pillDest').textContent = destinoNome;
    document.getElementById('pillDest').className = 'pill on';
    document.getElementById('hudCenter').innerHTML = '<div class="arrow">' + emoji + '</div><div class="label">' + direcao + '</div>';
    
    hudMsg('📡 Sinal ' + nomeCor + ' enviado para o VEX! Navegando para ' + destinoNome);
    toast('🟢 Sinal ' + nomeCor + '!');
}

function esconderSinalCor() {
    document.getElementById('colorOverlay').style.display = 'none';
    S.sinalAtivo = false;
    if (S.timeoutSinal) { clearTimeout(S.timeoutSinal); S.timeoutSinal = null; }
}

function enviarSinalNormal(corHex, direcao, emoji, destinoNome) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;background:' + corHex + ';opacity:0.9;z-index:50;box-shadow:0 0 80px ' + corHex + ';transition:all 0.3s;';
    document.getElementById('mainView').appendChild(overlay);
    
    try {
        var AC = window.AudioContext || window.webkitAudioContext;
        var ctx = new AC();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = direcao === 'NORTE' ? 600 : 800;
        gain.gain.value = 0.5;
        osc.start();
        setTimeout(function() { osc.stop(); ctx.close(); overlay.remove(); }, 4000);
    } catch(e) {}
    
    document.getElementById('pillDest').textContent = destinoNome;
    document.getElementById('pillDest').className = 'pill on';
    document.getElementById('hudCenter').innerHTML = '<div class="arrow">' + emoji + '</div><div class="label">' + direcao + '</div>';
}

// ============================================================
// 📏 DISTÂNCIA
// ============================================================
function calcularDistancia(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return Math.round(R * c);
}

function addToChat(type, msg) {
    S.chatHistory.push({ type: type, msg: msg, time: Date.now() });
    if (S.chatHistory.length > 20) S.chatHistory.shift();
    atualizarChatPanel();
}

function atualizarChatPanel() {
    var p = document.getElementById('chatPanel');
    if (!S.showChat) return;
    var h = '';
    for (var i = 0; i < S.chatHistory.length; i++) {
        var c = S.chatHistory[i];
        h += '<div class="chat-msg chat-' + (c.type === 'user' ? 'user' : 'ai') + '">' +
             (c.type === 'user' ? '<i class="fas fa-user"></i> ' : '<i class="fas fa-robot"></i> ') +
             c.msg.substring(0, 80) + '</div>';
    }
    p.innerHTML = h;
    if (h) p.scrollTop = p.scrollHeight;
}

function toggleChat() {
    S.showChat = !S.showChat;
    document.getElementById('chatPanel').style.display = S.showChat ? 'block' : 'none';
    if (S.showChat) atualizarChatPanel();
}

        h += '<div class="destino-card" onclick="selecionarDestino(' + i + ')">' +
             '<div class="dc-nome">' + d.emoji + ' ' + d.nome + (d.miniCidade ? ' 🎨' : '') + '</div>' +
             '<div class="dc-dir">' + d.seta + ' ' + d.dir + ' • ' + d.prov + '</div>' +
             '</div>';
    }
    p.innerHTML = h;
}

function selecionarDestino(i) {
    var d = DESTINOS[i];
    if (d.miniCidade && MAPA_CORES[d.nome]) {
        S.ultimoDestino = d.nome;
        var corInfo = MAPA_CORES[d.nome];
        definirDestino(d, false);
        mostrarSinalCor(corInfo.cor, corInfo.nome, corInfo.dir, corInfo.emoji, d.nome);
        var msg = '📍 ' + d.emoji + ' ' + d.nome + ' selecionado. Diga "Navegar" para iniciar.';
        addToChat('ai', msg);
        hudMsg(msg);
        speak(msg);
    } else {
        S.ultimoDestino = d.nome;
        definirDestino(d, true);
    }
}

function toggleDestinos() {
    var p = document.getElementById('destinosPanel');
    var show = p.style.display !== 'block';
    p.style.display = show ? 'block' : 'none';
    if (show) atualizarDestinosPanel();
}

// ============================================================
// 🎤 MICROFONE
// ============================================================
function toggleVoice() {
    S.listening ? stopListen() : startListen();
}

function iniciarReconhecimento() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { toast('Microfone não suportado'); return; }
    recog = new SR();
    recog.lang = 'pt-MZ';
    recog.interimResults = true;
    recog.continuous = false;
    recog.maxAlternatives = 1;
    
    var finalText = '';
    var hasHeard = false;
    
    recog.onstart = function() {
        S.listening = true;
        finalText = '';
        hasHeard = false;
        document.getElementById('btnVoice').innerHTML = '<i class="fas fa-microphone-alt"></i> OUVINDO';
        document.getElementById('btnVoice').classList.add('on');
        document.getElementById('voiceWave').style.display = 'flex';
        hudMsg('<i class="fas fa-microphone"></i> Fale agora...');
    };
    
    recog.onaudiostart = function() {
        hasHeard = true;
        hudMsg('<i class="fas fa-ear-listen"></i> Ouvindo...');
    };
    
    recog.onresult = function(e) {
        var t = '';
        for (var i = e.resultIndex; i < e.results.length; i++) {
            t += e.results[i][0].transcript;
        }
        hudMsg('Ouvindo: ' + t);
        if (e.results[e.results.length - 1].isFinal) {
            finalText = t.trim();
        }
    };
    
    recog.onend = function() {
        S.listening = false;
        document.getElementById('btnVoice').innerHTML = '<i class="fas fa-microphone"></i> FALAR';
        document.getElementById('btnVoice').classList.remove('on');
        document.getElementById('voiceWave').style.display = 'none';
        if (finalText) {
            addToChat('user', finalText);
            hudMsg('<i class="fas fa-user"></i> ' + finalText);
            processar(finalText);
        } else if (!hasHeard) {
            hudMsg('Nenhum som detectado.');
        } else {
            hudMsg('Não entendi. Tente novamente.');
        }
    };
    
    recog.onerror = function(e) {
        S.listening = false;
        document.getElementById('btnVoice').innerHTML = '<i class="fas fa-microphone"></i> FALAR';
        document.getElementById('btnVoice').classList.remove('on');
        document.getElementById('voiceWave').style.display = 'none';
        if (e.error === 'not-allowed') toast('🚫 Microfone bloqueado');
        else if (e.error === 'no-speech') hudMsg('Nenhuma fala.');
    };
    
    try { recog.start(); } catch(e) { stopListen(); }
}

function startListen() {
    if (S.listening || S.speaking) return;
    if (navigator.permissions) {
        navigator.permissions.query({ name: 'microphone' }).then(function(r) {
            if (r.state === 'denied') { toast('Microfone bloqueado'); return; }
            iniciarReconhecimento();
        }).catch(function() { iniciarReconhecimento(); });
    } else {
        iniciarReconhecimento();
    }
}

function stopListen() {
    S.listening = false;
    if (recog) { try { recog.stop(); } catch(e) {} recog = null; }
    document.getElementById('btnVoice').innerHTML = '<i class="fas fa-microphone"></i> FALAR';
    document.getElementById('btnVoice').classList.remove('on');
    document.getElementById('voiceWave').style.display = 'none';
}

// ============================================================
// 🔊 FALA
// ============================================================
function speak(texto) {
    if (!S.started || !texto) return;
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    S.speaking = true;
    document.getElementById('voiceWave').style.display = 'flex';
    var u = new SpeechSynthesisUtterance(texto);
    u.lang = 'pt-BR';
    u.rate = 0.9;
    u.pitch = 1.0;
    u.volume = 1.0;
    var voices = window.speechSynthesis.getVoices();
    if (voices && voices.length > 0) {
        for (var i = 0; i < voices.length; i++) {
            if (voices[i].lang && voices[i].lang.indexOf('pt') !== -1) { u.voice = voices[i]; break; }
        }
    }
    u.onstart = function() {
        document.getElementById('hudStatus').innerHTML = '<i class="fas fa-volume-up"></i> FALANDO';
    };
    u.onend = function() {
        S.speaking = false;
        document.getElementById('voiceWave').style.display = 'none';
        document.getElementById('hudStatus').innerHTML = '<i class="fas fa-brain"></i> ATIVA';
    };
    u.onerror = function() {
        S.speaking = false;
        document.getElementById('voiceWave').style.display = 'none';
        document.getElementById('hudStatus').innerHTML = '<i class="fas fa-brain"></i> ATIVA';
    };
    window.speechSynthesis.speak(u);
}

// ============================================================
// 📷 VISÃO
// ============================================================
async function initCam() {
    var v = document.getElementById('cam');
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
    try {
        camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 480 } }, audio: false });
        v.srcObject = camStream;
        await new Promise(function(r) { v.onloadedmetadata = function() { v.play().then(r).catch(r); }; setTimeout(r, 3000); });
        S.cam = true;
        return true;
    } catch(e) { return false; }
}

async function initAI() {
    try {
        model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
        S.model = true;
        startDetect();
        return true;
    } catch(e) { return false; }
}

function startDetect() {
    if (detectTimer) clearInterval(detectTimer);
    detectTimer = setInterval(detect, 3000);
}

function stopDetect() {
    if (detectTimer) { clearInterval(detectTimer); detectTimer = null; }
}

async function detect() {
    if (!S.model || !S.cam) return;
    var v = document.getElementById('cam'), c = document.getElementById('canvas'), ctx = c.getContext('2d');
    if (!v.videoWidth) return;
    try {
        var preds = await model.detect(v);
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        ctx.clearRect(0, 0, c.width, c.height);
        var h = 0, o = 0, detected = [];
        for (var i = 0; i < preds.length; i++) {
            var p = preds[i], isHuman = p.class === 'person', label = LABELS_PT[p.class] || p.class;
            if (isHuman) h++; else o++;
            if (p.score > 0.5) detected.push(label);
            var color = isHuman ? '#00e676' : p.score > 0.7 ? '#ffd740' : '#ff5252';
            ctx.strokeStyle = color;
            ctx.lineWidth = isHuman ? 4 : 2;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
            ctx.fillStyle = color;
            ctx.font = 'bold 12px Inter,sans-serif';
            ctx.fillText(label + ' ' + Math.round(p.score * 100) + '%', p.bbox[0] + 4, p.bbox[1] - 6);
        }
        S.humans = h;
        S.objects = o;
        document.getElementById('valHum').textContent = h;
        document.getElementById('valObj').textContent = o;
        document.getElementById('hudObj').innerHTML = '<i class="fas fa-eye"></i> ' + (h + o);
        if (detected.length > 0) {
            var ticker = document.getElementById('ticker');
            ticker.style.display = 'block';
            ticker.textContent = '👁 Detectado: ' + detected.slice(0, 5).join(', ');
        } else {
            document.getElementById('ticker').style.display = 'none';
        }
        if (S.navigating && !S.arrived) verificarChegada();
    } catch(e) {}
}

function verificarChegada() {
    if (!S.navStart) return;
    document.getElementById('valDist').textContent = Math.floor((Date.now() - S.navStart) / 1000) + 's';
    if ((Date.now() - S.navStart) > 8000) chegou();
}

// ============================================================
function sugerirDestino() {
    var d = DESTINOS[Math.floor(Math.random() * DESTINOS.length)];
    var msg = '💡 Sugiro: ' + d.emoji + ' ' + d.nome + ' (' + d.prov + ', ' + d.dir + '). ' + d.desc;

    speak(msg + '. Quer navegar para lá?');
}

function gerarRelatorio() {
    var r = '🤖 IA: Offline (Inteligente) | Cam:' + (S.cam ? 'Ativa' : 'Off') + ' | Humanos:' + S.humans + ' | Objetos:' + S.objects;
    hudMsg(r);
    speak(r);
}

// ============================================================
// 📝 INPUT DE TEXTO
// ============================================================
function enviarTexto() {
    var input = document.getElementById('textInput');
    var texto = input.value.trim();
    if (!texto) return;
    addToChat('user', texto);
    hudMsg('<i class="fas fa-user"></i> ' + texto);

    processar(texto);
}

// 🚀 ATIVAÇÃO
// ============================================================
document.getElementById('startBtn').addEventListener('click', function() {
    document.getElementById('startOverlay').classList.add('hidden');
    S.started = true;
    document.getElementById('hudCenter').innerHTML = '<div class="arrow">🧠</div><div class="label">SUPER CENTRAL ATIVA</div>';
    document.getElementById('hudStatus').innerHTML = '<i class="fas fa-brain"></i> ATIVA';
    var saudacao = 'Olá! Sou a Super Central VEX Premium. Posso ajudar com informações sobre destinos em Moçambique. Para navegar com o robô, diga "Ir para Museu da Mueda", "Ir para Monumento" ou "Ir para Fortaleza". Pergunte sobre qualquer lugar livremente!';
    addToChat('ai', saudacao);

    initCam().then(function(c) { if (c) initAI(); });
    atualizarDestinosPanel();
});

    t.innerHTML = m;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
}
